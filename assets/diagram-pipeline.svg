<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <title>dodo — pipeline diagram: .do file → dodo → DuckDB</title>

  
  <line x1="40" y1="100" x2="680" y2="100" stroke="#1A1A1A" stroke-width="3"></line>

  
  <g transform="translate(120,100)">
    <rect x="-72" y="-40" width="144" height="80" rx="12" fill="#F3E7C9" stroke="#1A1A1A" stroke-width="3"></rect>
    
