  </g>

  
  <path d="M 198 100 L 268 100 M 256 91 L 268 100 L 256 109" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>

  
  <g transform="translate(360,100)">
