<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760" fill="none" role="img" aria-label="dodo supported commands">
  <title>dodo — supported commands</title>
  <rect width="1120" height="760" fill="#F7F2E8"></rect>

  
  <text x="40" y="56" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="600" font-size="13" fill="#5E3D1C" letter-spacing="2.5">SUPPORTED COMMANDS · v0.1.0</text>
  <text x="40" y="100" font-family="IBM Plex Sans, system-ui, sans-serif" font-weight="700" font-size="32" fill="#1A1A1A" letter-spacing="-0.6">Write Stata. Run DuckDB.</text>
  <text x="40" y="128" font-family="IBM Plex Sans, system-ui, sans-serif" font-weight="400" font-size="16" fill="#2A2722">23 commands in three families — every one translates to SQL.</text>

  
  <g transform="translate(40,170)">
    <rect x="4" y="4" width="340" height="500" rx="14" fill="#1A1A1A"></rect>
    <rect x="0" y="0" width="340" height="500" rx="14" fill="#FFFCF4" stroke="#1A1A1A" stroke-width="3"></rect>
    <rect x="0" y="0" width="340" height="64" rx="14" fill="#D8A44C"></rect>
    <rect x="0" y="50" width="340" height="14" fill="#D8A44C"></rect>
    <line x1="0" y1="64" x2="340" y2="64" stroke="#1A1A1A" stroke-width="3"></line>
    <text x="20" y="28" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="10" fill="#5E3D1C" letter-spacing="2">FAMILY · 01</text>
    <text x="20" y="54" font-family="IBM Plex Sans, system-ui, sans-serif" font-weight="700" font-size="22" fill="#1A1A1A">Data I/O</text>
    <text x="320" y="40" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="800" font-size="22" fill="#1A1A1A">5</text>

    <g font-family="JetBrains Mono, ui-monospace, monospace">
      <text x="20" y="106" font-weight="800" font-size="16" fill="#1A1A1A">use</text>
      <text x="20" y="126" font-weight="500" font-size="12.5" fill="#6B6760">use &#34;firms.csv&#34;, clear</text>
      <text x="20" y="164" font-weight="800" font-size="16" fill="#1A1A1A">save</text>
      <text x="20" y="184" font-weight="500" font-size="12.5" fill="#6B6760">save &#34;out.parquet&#34;, replace</text>
      <text x="20" y="222" font-weight="800" font-size="16" fill="#1A1A1A">append</text>
      <text x="20" y="242" font-weight="500" font-size="12.5" fill="#6B6760">append using &#34;more.csv&#34;</text>
      <text x="20" y="280" font-weight="800" font-size="16" fill="#1A1A1A">do</text>
      <text x="20" y="300" font-weight="500" font-size="12.5" fill="#6B6760">do &#34;script.do&#34;</text>
      <text x="20" y="338" font-weight="800" font-size="16" fill="#1A1A1A">clear</text>
      <text x="20" y="358" font-weight="500" font-size="12.5" fill="#6B6760">clear</text>
    </g>

    
    <g transform="translate(20,390)">
      <rect x="0" y="0" width="300" height="86" rx="10" fill="#EBD299" stroke="#1A1A1A" stroke-width="2"></rect>
      <text x="14" y="22" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="10" fill="#5E3D1C" letter-spacing="1.5">FORMATS · AUTO-DETECTED</text>
      <g font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="13" fill="#1A1A1A">
        <text x="14" y="46">.csv</text>
        <text x="74" y="46">.parquet</text>
        <text x="170" y="46">.json</text>
        <text x="232" y="46">.dta</text>
      </g>
      <text x="14" y="70" font-family="IBM Plex Sans, system-ui, sans-serif" font-weight="400" font-size="12" fill="#2A2722">Inferred from extension. No glue code.</text>
    </g>
  </g>

  
  <g transform="translate(390,170)">
    <rect x="4" y="4" width="340" height="500" rx="14" fill="#1A1A1A"></rect>
    <rect x="0" y="0" width="340" height="500" rx="14" fill="#FFFCF4" stroke="#1A1A1A" stroke-width="3"></rect>
    <rect x="0" y="0" width="340" height="64" rx="14" fill="#D8A44C"></rect>
    <rect x="0" y="50" width="340" height="14" fill="#D8A44C"></rect>
    <line x1="0" y1="64" x2="340" y2="64" stroke="#1A1A1A" stroke-width="3"></line>
    <text x="20" y="28" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="10" fill="#5E3D1C" letter-spacing="2">FAMILY · 02</text>
    <text x="20" y="54" font-family="IBM Plex Sans, system-ui, sans-serif" font-weight="700" font-size="22" fill="#1A1A1A">Data manipulation</text>
    <text x="320" y="40" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="800" font-size="22" fill="#1A1A1A">11</text>

    <g font-family="JetBrains Mono, ui-monospace, monospace" font-weight="800" font-size="14" fill="#1A1A1A">
      <text x="20" y="100">keep</text>
      <text x="120" y="100">drop</text>
      <text x="220" y="100">generate</text>
      <text x="20" y="140">replace</text>
      <text x="120" y="140">rename</text>
      <text x="220" y="140">sort</text>
      <text x="20" y="180">order</text>
      <text x="120" y="180">egen</text>
      <text x="220" y="180">collapse</text>
      <text x="20" y="220">mvencode</text>
      <text x="120" y="220">reshape</text>
    </g>

    
    <g transform="translate(20,254)">
      <rect x="0" y="0" width="300" height="212" rx="10" fill="#15130E" stroke="#1A1A1A" stroke-width="2"></rect>
      <text x="14" y="24" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="10" fill="#D8A44C" letter-spacing="1.5">EXAMPLE</text>
      <g font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="13" fill="#F3E7C9">
        <text x="14" y="50">generate ln_w = log(wage)</text>
        <text x="14" y="74">replace ln_w = 0 if missing(wage)</text>
        <text x="14" y="98">collapse (mean) avg_w = ln_w,</text>
        <text x="14" y="118">         by(industry year)</text>
        <text x="14" y="148">sort year, desc</text>
        <text x="14" y="172">keep if avg_w &gt; 8</text>
      </g>
      
      <text x="14" y="200" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="600" font-size="10.5" fill="#9C927C" letter-spacing="0.5">_n = row #</text>
      <text x="100" y="200" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="600" font-size="10.5" fill="#9C927C" letter-spacing="0.5">_N = total rows</text>
    </g>
  </g>

  
  <g transform="translate(740,170)">
    <rect x="4" y="4" width="340" height="500" rx="14" fill="#1A1A1A"></rect>
    <rect x="0" y="0" width="340" height="500" rx="14" fill="#FFFCF4" stroke="#1A1A1A" stroke-width="3"></rect>
    <rect x="0" y="0" width="340" height="64" rx="14" fill="#D8A44C"></rect>
    <rect x="0" y="50" width="340" height="14" fill="#D8A44C"></rect>
    <line x1="0" y1="64" x2="340" y2="64" stroke="#1A1A1A" stroke-width="3"></line>
    <text x="20" y="28" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="10" fill="#5E3D1C" letter-spacing="2">FAMILY · 03</text>
    <text x="20" y="54" font-family="IBM Plex Sans, system-ui, sans-serif" font-weight="700" font-size="22" fill="#1A1A1A">Inspection</text>
    <text x="320" y="40" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="800" font-size="22" fill="#1A1A1A">7</text>

    
    <g transform="translate(20,82)">
      <rect x="0" y="0" width="180" height="22" rx="11" fill="#15130E"></rect>
      <text x="90" y="15" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="10" fill="#D8A44C" letter-spacing="1.2">TRIGGERS EXECUTION ›</text>
    </g>

    <g font-family="JetBrains Mono, ui-monospace, monospace">
      <text x="20" y="138" font-weight="800" font-size="16" fill="#1A1A1A">list</text>
      <text x="20" y="158" font-weight="500" font-size="12.5" fill="#6B6760">list var1 var2 if x &gt; 0</text>
      <text x="20" y="196" font-weight="800" font-size="16" fill="#1A1A1A">count</text>
      <text x="20" y="216" font-weight="500" font-size="12.5" fill="#6B6760">count if year == 2020</text>
      <text x="20" y="254" font-weight="800" font-size="16" fill="#1A1A1A">head · tail</text>
      <text x="20" y="274" font-weight="500" font-size="12.5" fill="#6B6760">head 10  ·  tail 5</text>
      <text x="20" y="312" font-weight="800" font-size="16" fill="#1A1A1A">describe · summarize · tabulate</text>
      <text x="20" y="332" font-weight="500" font-size="12.5" fill="#6B6760">summarize wage, by(year)</text>
    </g>

    
    <g transform="translate(20,360)">
      <rect x="0" y="0" width="300" height="116" rx="10" fill="#EBD299" stroke="#1A1A1A" stroke-width="2"></rect>
      <text x="14" y="24" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="10" fill="#5E3D1C" letter-spacing="1.5">LAZY BY DEFAULT</text>
      <text x="14" y="50" font-family="IBM Plex Sans, system-ui, sans-serif" font-weight="600" font-size="14" fill="#1A1A1A">Inspection commands are the</text>
      <text x="14" y="68" font-family="IBM Plex Sans, system-ui, sans-serif" font-weight="600" font-size="14" fill="#1A1A1A">only ones that materialize.</text>
      <text x="14" y="92" font-family="IBM Plex Sans, system-ui, sans-serif" font-weight="400" font-size="12.5" fill="#2A2722">Everything else just extends the</text>
      <text x="14" y="108" font-family="IBM Plex Sans, system-ui, sans-serif" font-weight="400" font-size="12.5" fill="#2A2722">CTE chain. Costs nothing until you ask.</text>
    </g>
  </g>

  
  <rect x="40" y="694" width="1040" height="40" rx="20" fill="#1A1A1A"></rect>
  <text x="60" y="720" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="12" fill="#D8A44C" letter-spacing="1.5">23 COMMANDS</text>
  <line x1="200" y1="708" x2="200" y2="724" stroke="#7A6F55" stroke-width="1.5"></line>
  <text x="220" y="720" font-family="IBM Plex Sans, system-ui, sans-serif" font-weight="400" font-size="13" fill="#F3E7C9">100% translated to SQL — no shell-out, no temp files.</text>
  <text x="1060" y="720" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="600" font-size="12" fill="#9C927C" letter-spacing="1">dodo · 0.1.0</text>
</svg>