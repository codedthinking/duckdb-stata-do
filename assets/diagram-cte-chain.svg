<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" fill="none" role="img" aria-label="dodo translates .do commands into a lazy CTE chain">
  <title>dodo — lazy CTE chain</title>

  
  <rect width="1120" height="720" fill="#F7F2E8"></rect>

  
  <text x="40" y="56" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="600" font-size="13" fill="#5E3D1C" letter-spacing="2.5">HOW IT WORKS</text>
  <text x="40" y="98" font-family="IBM Plex Sans, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-weight="700" font-size="32" fill="#1A1A1A" letter-spacing="-0.6">Each command appends a CTE step.</text>
  <text x="40" y="128" font-family="IBM Plex Sans, -apple-system, system-ui, sans-serif" font-weight="400" font-size="16" fill="#2A2722">Nothing executes until a terminal command materializes the chain.</text>

  
  <text x="40" y="178" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="11" fill="#6B6760" letter-spacing="2">.DO COMMAND</text>
  <text x="600" y="178" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="11" fill="#6B6760" letter-spacing="2">CTE STEP APPENDED</text>

  
  
  <g transform="translate(40,196)">
    <rect x="4" y="4" width="380" height="64" rx="10" fill="#1A1A1A"></rect>
    <rect x="0" y="0" width="380" height="64" rx="10" fill="#FFFCF4" stroke="#1A1A1A" stroke-width="2.5"></rect>
    <text x="20" y="40" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="17" fill="#1A1A1A">use &#34;firms.csv&#34;, clear</text>
  </g>
  
  <path d="M 440 228 L 580 228 M 568 219 L 580 228 L 568 237" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
  
  <g transform="translate(600,196)">
    <rect x="4" y="4" width="480" height="64" rx="10" fill="#D8A44C"></rect>
    <rect x="0" y="0" width="480" height="64" rx="10" fill="#15130E" stroke="#1A1A1A" stroke-width="2.5"></rect>
    
    <text x="16" y="24" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="10" fill="#D8A44C" letter-spacing="1.5">STEP 1</text>
    
    <text x="16" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="600" font-size="15" fill="#F3E7C9">_s0</text>
    <text x="46" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="15" fill="#E8B45A">AS</text>
    <text x="76" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="15" fill="#F3E7C9">(</text>
    <text x="84" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="15" fill="#E8B45A">SELECT</text>
    <text x="148" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="15" fill="#F3E7C9">*</text>
    <text x="160" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="15" fill="#E8B45A">FROM</text>
    <text x="210" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="15" fill="#F3E7C9">read_csv(</text>
    <text x="298" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="15" fill="#C9A66B">&#39;firms.csv&#39;</text>
    <text x="400" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="15" fill="#F3E7C9">))</text>
  </g>

  
  <g transform="translate(40,278)">
    <rect x="4" y="4" width="380" height="64" rx="10" fill="#1A1A1A"></rect>
    <rect x="0" y="0" width="380" height="64" rx="10" fill="#FFFCF4" stroke="#1A1A1A" stroke-width="2.5"></rect>
    <text x="20" y="40" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="17" fill="#1A1A1A">keep if year == 2018</text>
  </g>
  <path d="M 440 310 L 580 310 M 568 301 L 580 310 L 568 319" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
  <g transform="translate(600,278)">
    <rect x="4" y="4" width="480" height="64" rx="10" fill="#D8A44C"></rect>
    <rect x="0" y="0" width="480" height="64" rx="10" fill="#15130E" stroke="#1A1A1A" stroke-width="2.5"></rect>
    <text x="16" y="24" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="10" fill="#D8A44C" letter-spacing="1.5">STEP 2</text>
    <text x="16" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="600" font-size="15" fill="#F3E7C9">_s1</text>
    <text x="46" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="15" fill="#E8B45A">AS</text>
    <text x="76" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="15" fill="#F3E7C9">(</text>
    <text x="84" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="15" fill="#E8B45A">SELECT</text>
    <text x="148" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="15" fill="#F3E7C9">*</text>
    <text x="160" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="15" fill="#E8B45A">FROM</text>
    <text x="210" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="15" fill="#F3E7C9">_s0</text>
    <text x="240" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="15" fill="#E8B45A">WHERE</text>
    <text x="298" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="15" fill="#F3E7C9">year == </text>
    <text x="372" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="15" fill="#DD9A55">2018</text>
    <text x="416" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="15" fill="#F3E7C9">)</text>
  </g>

  
  <g transform="translate(40,360)">
    <rect x="4" y="4" width="380" height="64" rx="10" fill="#1A1A1A"></rect>
    <rect x="0" y="0" width="380" height="64" rx="10" fill="#FFFCF4" stroke="#1A1A1A" stroke-width="2.5"></rect>
    <text x="20" y="40" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="17" fill="#1A1A1A">generate ln_rev = log(rev)</text>
  </g>
  <path d="M 440 392 L 580 392 M 568 383 L 580 392 L 568 401" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
  <g transform="translate(600,360)">
    <rect x="4" y="4" width="480" height="64" rx="10" fill="#D8A44C"></rect>
    <rect x="0" y="0" width="480" height="64" rx="10" fill="#15130E" stroke="#1A1A1A" stroke-width="2.5"></rect>
    <text x="16" y="24" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="10" fill="#D8A44C" letter-spacing="1.5">STEP 3</text>
    <text x="16" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="600" font-size="15" fill="#F3E7C9">_s2</text>
    <text x="46" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="15" fill="#E8B45A">AS</text>
    <text x="76" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="15" fill="#F3E7C9">(</text>
    <text x="84" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="15" fill="#E8B45A">SELECT</text>
    <text x="148" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="15" fill="#F3E7C9">*, </text>
    <text x="178" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="15" fill="#F3E7C9">LN(rev)</text>
    <text x="248" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="15" fill="#E8B45A">AS</text>
    <text x="278" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="15" fill="#F3E7C9">ln_rev </text>
    <text x="346" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="15" fill="#E8B45A">FROM</text>
    <text x="396" y="50" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="15" fill="#F3E7C9">_s1)</text>
  </g>

  
  <line x1="40" y1="468" x2="1080" y2="468" stroke="#1A1A1A" stroke-width="2" stroke-dasharray="4 6"></line>
  <g transform="translate(420,448)">
    <rect x="4" y="4" width="280" height="40" rx="20" fill="#1A1A1A"></rect>
    <rect x="0" y="0" width="280" height="40" rx="20" fill="#EBD299" stroke="#1A1A1A" stroke-width="2.5"></rect>
    <circle cx="22" cy="20" r="5" fill="#1A1A1A"></circle>
    <text x="38" y="26" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="13" fill="#1A1A1A" letter-spacing="0.5">deferred — nothing has run yet</text>
  </g>

  
  <g transform="translate(40,514)">
    
    <rect x="4" y="4" width="380" height="76" rx="10" fill="#1A1A1A"></rect>
    <rect x="0" y="0" width="380" height="76" rx="10" fill="#D8A44C" stroke="#1A1A1A" stroke-width="2.5"></rect>
    <text x="20" y="32" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="10" fill="#5E3D1C" letter-spacing="2">TERMINAL COMMAND</text>
    <text x="20" y="60" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="800" font-size="22" fill="#1A1A1A">list</text>
  </g>
  
  <path d="M 440 552 L 580 552 M 564 539 L 580 552 L 564 565" stroke="#1A1A1A" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>

  <g transform="translate(600,514)">
    <rect x="4" y="4" width="480" height="76" rx="10" fill="#D8A44C"></rect>
    <rect x="0" y="0" width="480" height="76" rx="10" fill="#15130E" stroke="#1A1A1A" stroke-width="2.5"></rect>
    <text x="16" y="24" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="10" fill="#D8A44C" letter-spacing="1.5">EXECUTES</text>
    <text x="16" y="48" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="14" fill="#E8B45A">WITH</text>
    <text x="64" y="48" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="14" fill="#F3E7C9">_s0, _s1, _s2 ...</text>
    <text x="16" y="68" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="14" fill="#E8B45A">SELECT</text>
    <text x="80" y="68" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="14" fill="#F3E7C9">*</text>
    <text x="92" y="68" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="700" font-size="14" fill="#E8B45A">FROM</text>
    <text x="142" y="68" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="14" fill="#F3E7C9">_s2 </text>
    <text x="186" y="68" font-family="JetBrains Mono, ui-monospace, monospace" font-style="italic" font-weight="500" font-size="13" fill="#7A6F55">— DuckDB optimizes the whole chain</text>
  </g>

  
  <text x="40" y="650" font-family="IBM Plex Sans, system-ui, sans-serif" font-weight="500" font-size="14" fill="#2A2722">DuckDB plans and runs the full CTE chain as one query — no intermediate materialization.</text>
  <text x="40" y="676" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="12" fill="#6B6760" letter-spacing="1.5">CSV · PARQUET · JSON · DTA   —   file formats auto-detected</text>
</svg>