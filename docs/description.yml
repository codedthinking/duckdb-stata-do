extension:
  name: dodo
  description: "Run .do files in DuckDB"
  version: 0.2.0
  language: C++
  build: cmake
  license: MIT
  maintainers:
    - korenmiklos

repo:
  github: codedthinking/dodo
  ref: main

docs:
  hello_world: |
    -- Run .do commands in DuckDB
    use "data/firms.csv", clear;
    keep if year >= 2020;
    generate profit = revenue - cost;
    list;
  extended_description: |
    dodo reads .do file commands and executes them on DuckDB's analytical
    engine. Supports data manipulation (keep, drop, generate, replace,
    rename, sort, egen, collapse, reshape, merge), inspection (list, count,
    summarize, tabulate, describe, history), state management (undo, redo,
    preserve, restore), and I/O (use, save, append, import/export delimited).
    Run .do files directly with `do "script.do"`. Inspired by Kezdi.jl.

compiler:
  name: dodoc
  description: "Standalone .do-to-SQL compiler — no DuckDB required"
  install:
    curl: "curl -fsSL https://getdodo.dev/install.sh | sh"
    brew: "brew install codedthinking/tap/dodoc"
  platforms:
    - macos-arm64
    - macos-x86_64
    - linux-x86_64
    - linux-arm64
    - windows-x86_64
